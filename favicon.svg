<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 64) rotate(90) scale(64)">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="65%" stop-color="#050B1A"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <radialGradient id="glowCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 64) rotate(90) scale(28)">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="1"/>
      <stop offset="35%" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="outerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 64) rotate(90) scale(46)">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#312E81" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <circle cx="64" cy="64" r="44" fill="url(#outerGlow)" filter="url(#blur)"/>
  <circle cx="64" cy="64" r="30" fill="url(#glowCore)"/>
  <circle cx="64" cy="64" r="14" fill="#F8FAFC" fill-opacity="0.92"/>
  <circle cx="58" cy="58" r="5" fill="#FFFFFF" fill-opacity="0.55"/>

  <circle cx="30" cy="38" r="1.4" fill="#C4B5FD" fill-opacity="0.55"/>
  <circle cx="98" cy="44" r="1.2" fill="#C4B5FD" fill-opacity="0.45"/>
  <circle cx="92" cy="88" r="1.5" fill="#A5B4FC" fill-opacity="0.4"/>
  <circle cx="40" cy="94" r="1.1" fill="#A5B4FC" fill-opacity="0.35"/>
</svg>